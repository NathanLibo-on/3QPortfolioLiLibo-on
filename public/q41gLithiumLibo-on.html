<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Club / Organization Application Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
        }

        form {
            width: 600px;
            margin: auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
        }

        legend {
            font-weight: bold;
            padding: 0 10px;
        }

        label {
            display: block;
            margin-bottom: 12px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            border: 2px solid #007bff;
            outline: none;
            background-color: #eef6ff;
        }

        .invalid {
            border: 2px solid red;
            background-color: #ffecec;
        }

        .buttons {
            text-align: center;
        }

        .buttons input {
            width: 120px;
            margin: 10px;
            padding: 10px;
        }
        nav {
            text-align: center;
            margin-top: 20px;
        }
        button {
            display: block;
            margin: 0 auto;
            padding: 10px 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .custom-checkbox {
            display: inline-block;
            width: 40px;
            height: 40px;
            background-color: #fff;
            border: 2px solid #555;
            cursor: pointer;
            transition: all 0.3s ease;
            clip-path: polygon(
                50% 0%,
                61% 35%,
                98% 35%,
                68% 57%,
                79% 91%,
                50% 70%,
                21% 91%,
                32% 57%,
                2% 35%,
                39% 35%
            );
        }

    </style>

    <script>
        function confirmReset() {
            return confirm("Are you sure you want to reset the form?");
        }

        function toLocalStorage() {
            
            if (!confirmSubmit("Do you want to submit this application?")) {
                return false;
            }

            let movieData = {
                club: document.getElementById('title').value,
                year: document.getElementById('year').value,
                movie_genre: document.getElementById('movie_genre').value,
                grade_level: document.getElementById('grade_level').value,
            }; //converts the data into values

            let movies = JSON.parse(localStorage.getItem('movies')) || [];
            movies.push(movieData);
            localStorage.setItem('movies', JSON.stringify(movies));
            //turns object into string, sends to localStorage

            alert("Application data saved locally.");
            return true;

            function confirmSubmit() {
            return confirm("Are you sure you want to submit this application?");
            }

        }
        function validateBlur(element) {
            if (element.value.trim() === "") {
                element.classList.add("invalid");
            } else {
                element.classList.remove("invalid");
            }
        }
    </script>
</head>
<body>

<form id="myForm" onsubmit="return toLocalStorage()" onreset="return confirmReset()">

    <h1>Add a Movie</h1>

        <label>
            Title:
            <input type="text" name="title" id="title" required onblur="validateBlur(this)">
        </label>

        <label>
            Year:
            <input type="number" name="year" id="year" required onblur="validateBlur(this)">
        </label>

        <label>
            Genre:
            <select name="movie_genre" id="movie_genre" required onblur="validateBlur(this)">
                <option value="">-- Select Movie Genre --</option>
                <option value="action">Action</option>
                <option value="comedy">Comedy</option>
                <option value="drama">Drama</option>
                <option value="horror">Horror</option>
                <option value="sci-fi">Sci-fi</option>
                <option value="romance">Romance</option>
                <option value="thriller">Thriller</option>
                <option value="documentary">Documentary</option>
            </select>
        </label>

        <label style="position: relative;">
            <input type="checkbox">
            <span class="custom-checkbox"></span>
            Star Checkbox
        </label>
        

    <div class="buttons">
        <input type="submit" value="Add Movie">
    </div>
    
    <h1>Movie List</h1>

</form>
<nav>
    <a href="../index.html"> Back to Portfolio </a>
</nav>

</body>
</html>
