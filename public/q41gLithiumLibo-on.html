<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Club / Organization Application Form</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#ececec;
        }

        .container{
            width:600px;
            margin:40px auto;
            background:rgb(177, 175, 159);
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1,h2{
            text-align:center;
        }

        label{
            display:block;
            margin-top:20px;
            font-weight:bold;
        }
        
        input,select{
            width:100%;
            padding:10px;
            margin-top:8px;
            border-radius:6px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:12px;
            background:#4e91e3;
            color:white;
            border:none;
            border-radius:6px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#155ab0;
        }

        .stars{
            margin-top:10px;
        }

        .star{
            font-size:28px;
            cursor:pointer;
            color:#ccc;
        }
        /* When star is selected it becomes gold */
        .star.active{
            color:gold;
        }
        /* Style for each movie entry in the movie list */
        .movie{
            background:#e8e8e8;
            padding:12px;
            margin-top:12px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        .rating-stars{
            color:gold;
        }

        nav{
            text-align:center;
            margin-top:20px;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Add a Movie</h1>

        <form id="myForm">

        <label>
            Title:
            <input type="text" id="title" required>
        </label>

        <label>
            Year:
            <input type="number" id="year" required>
        </label>

        <label>
            Genre:
            <select id="movie_genre" required>
            <option value="">-- Select Movie Genre --</option>
            <option value="Action">Action</option>
            <option value="Comedy">Comedy</option>
            <option value="Drama">Drama</option>
            <option value="Horror">Horror</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Romance">Romance</option>
            <option value="Thriller">Thriller</option>
            <option value="Documentary">Documentary</option>
            </select>
        </label>

        <label>Rating:</label>
            <div class="stars">
            <span class="star">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
            </div>

<button type="submit">Add Movie</button>

</form>

<h2>Movie List</h2>

    <div id="movieList"></div>

    </div>

<nav>
    <a href="../index.html">Back to Portfolio</a>
</nav>

<script>

document.addEventListener("DOMContentLoaded", function(){

var rating = 0;
var stars = document.querySelectorAll(".star");

// When a star is clicked, the function setRating will run
for (var i = 0; i < stars.length; i++) {
    stars[i].addEventListener("click", setRating);
}

// This function runs whenever a star is clicked
function setRating(event){
    var clickedStar = event.target;
    for (var i = 0; i < stars.length; i++) {
        if (stars[i] === clickedStar) {
            rating = i + 1;
        }
    }
    updateStars();
}

// This function updates the star colors based on the rating
function updateStars(){
    for (var i = 0; i < stars.length; i++) {
        if (i < rating) {
            stars[i].classList.add("active");
        }
        else{
            stars[i].classList.remove("active");
        }
    }
}

function getMovies(){
    var movies = localStorage.getItem("movies");
    if (movies != null){
        movies = JSON.parse(movies);
        return movies;
    }
    else{
        return [];
    }
}

function saveMovies(movies){
    localStorage.setItem("movies", JSON.stringify(movies));
}

/* NEW: delete function */
function deleteMovie(index){
    var confirmDelete = confirm("Are you sure you want to delete this movie?");
    if(confirmDelete){
        var movies = getMovies();
        movies.splice(index, 1);
        saveMovies(movies);
        displayMovies();
    }
}

/* Display all stored movies on the webpage */
function displayMovies(){

    const movieList = document.getElementById("movieList");
    movieList.innerHTML = "";

    const movies = getMovies();

    movies.forEach((movie, index) => {

        let starsDisplay = "★".repeat(movie.rating);

        const div = document.createElement("div");
        div.classList.add("movie");

        div.innerHTML =
        `${movie.title} (${movie.year}) - ${movie.genre}, Rating: 
        <span class="rating-stars">${starsDisplay}</span>
        <button onclick="deleteMovie(${index})" style="margin-left:10px; width: 100px; background:gray;">Delete</button>`;

        movieList.appendChild(div);

    });
}

/* Event listener for when the form is submitted */
document.getElementById("myForm").addEventListener("submit", function(e){

    e.preventDefault();

    const title = document.getElementById("title").value;
    const year = document.getElementById("year").value;
    const genre = document.getElementById("movie_genre").value;

    const movies = getMovies();

    // NEW: check if movie already exists
    var existingMovie = null;

    for (var i = 0; i < movies.length; i++) {
        if (
            movies[i].title.toLowerCase() === title.toLowerCase() &&
            movies[i].year == year
        ){
            existingMovie = movies[i];
        }
    }

    if(existingMovie){
        // NEW: update rating by averaging
        existingMovie.total += rating;
        existingMovie.count += 1;
        existingMovie.rating = Math.ceil(existingMovie.total / existingMovie.count);
    }
    else{
        const movie = {
            title: title,
            year: year,
            genre: genre,
            rating: rating,
            total: rating,
            count: 1
        };

        movies.push(movie);
    }

    saveMovies(movies);
    displayMovies();

    this.reset();

    rating = 0;
    stars.forEach(s => s.classList.remove("active"));

});

displayMovies();

/* IMPORTANT: make delete function accessible to HTML */
window.deleteMovie = deleteMovie;

});

</script>
