<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Club / Organization Application Form</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#ececec;
        }

        .container{
            width:600px;
            margin:40px auto;
            background:rgb(177, 175, 159);
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1,h2{
            text-align:center;
        }

        label{
            display:block;
            margin-top:20px;
            font-weight:bold;
        }
        
        input,select{
            width:100%;
            padding:10px;
            margin-top:8px;
            border-radius:6px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:12px;
            background:#4e91e3;
            color:white;
            border:none;
            border-radius:6px;
            font-size:18px;
            cursor:pointer;
        }

        .custom-checkbox {
            display: inline-block;
            width: 40px;
            height: 40px;
            background-color: #fff;
            border: 2px solid #555;
            cursor: pointer;
            transition: all 0.3s ease;
            clip-path: polygon(
                50% 0%,
                61% 35%,
                98% 35%,
                68% 57%,
                79% 91%,
                50% 70%,
                21% 91%,
                32% 57%,
                2% 35%,
                39% 35%
            );
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Add a Movie</h1>

        <form id="myForm">

        <label>
            Title:
            <input type="text" id="title" required>
        </label>

        <label>
            Year:
            <input type="number" id="year" required>
        </label>

        <label>
            Genre:
            <select id="movie_genre" required>
            <option value="">-- Select Movie Genre --</option>
            <option value="Action">Action</option>
            <option value="Comedy">Comedy</option>
            <option value="Drama">Drama</option>
            <option value="Horror">Horror</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Romance">Romance</option>
            <option value="Thriller">Thriller</option>
            <option value="Documentary">Documentary</option>
            </select>
        </label>

        <label>Rating:</label>
            <div class="stars">
            <span class="star">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
            </div>

<button type="submit">Add Movie</button>

</form>

<h2>Movie List</h2>

    <div id="movieList"></div>

    </div>

<nav>
    <a href="../index.html">Back to Portfolio</a>
</nav>

</body>
</html>
